<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Favicon デザイン確認</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #18181b; /* Twitch風ダーク背景 */
            color: #efeff1;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 50px;
        }
        .icon-container {
            text-align: center;
        }
        .icon-box {
            background-color: #0e0e10;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #303032;
            margin-bottom: 15px;
        }
        /* ページ上で見やすいように120pxに拡大して表示 */
        .preview svg { 
            width: 120px; 
            height: 120px; 
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <h3>案1：シンプル<br>（絵文字）</h3>
        <div class="icon-box preview">
            <svg xmlns="http://www.w3.org/2004/svg" viewBox="0 0 100 100">
                <text x="50" y="45" font-size="55" text-anchor="middle" dominant-baseline="central">🦊</text>
                <text x="10" y="85" font-size="35">🔰</text>
                <text x="90" y="85" font-size="35" text-anchor="end">🍁</text>
            </svg>
        </div>
    </div>

    <div class="icon-container">
        <h3>案2：ロゴ風<br>（図形描画）</h3>
        <div class="icon-box preview">
            <svg xmlns="http://www.w3.org/2004/svg" viewBox="0 0 100 100">
                <polygon points="50,85 15,40 30,15 50,40 70,15 85,40" fill="#ff7f00"/>
                <circle cx="35" cy="50" r="5" fill="white"/>
                <circle cx="65" cy="50" r="5" fill="white"/>
                <circle cx="50" cy="70" r="4" fill="black"/>
                <text x="5" y="95" font-size="35">🔰</text>
                <text x="95" y="95" font-size="35" text-anchor="end">🍁</text>
            </svg>
        </div>
    </div>

    <div class="icon-container">
        <h3>案3：ツール風<br>（バッジ）</h3>
        <div class="icon-box preview">
            <svg xmlns="http://www.w3.org/2004/svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#9146FF"/>
                <text x="50" y="45" font-size="45" text-anchor="middle" dominant-baseline="central">🦊</text>
                <text x="30" y="75" font-size="25" text-anchor="middle">🔰</text>
                <text x="70" y="75" font-size="25" text-anchor="middle">🍁</text>
            </svg>
        </div>
    </div>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2004/svg%22 viewBox=%220 0 100 100%22><polygon points=%2250,90 10,60 10,20 90,20 90,60%22 fill=%22%239146FF%22/><path d=%22M50 80 Q30 80 20 60 Q20 30 50 30 Q80 30 80 60 Q70 80 50 80Z%22 fill=%22%23FFFBE6%22 stroke=%22%238B4513%22 stroke-width=%222%22/><path d=%22M50 30 L50 80%22 stroke=%22%238B4513%22 stroke-width=%222%22/><path d=%22M70 70 Q90 60 90 20 Q50 20 70 70Z%22 fill=%22%238B4513%22/><path d=%22M70 70 L55 85%22 stroke=%22%238B4513%22 stroke-width=%222%22/><circle cx=%2255%22 cy=%2285%22 r=%223%22 fill=%22%23D4AF37%22/><text x=%2230%22 y=%2245%22 font-size=%2220%22>%F0%9F%94%B0</text><text x=%2230%22 y=%2270%22 font-size=%2220%22>%F0%9F%8D%81</text></svg>">
</body>
</html>
